{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratix Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* All your custom dashboard styles */
        body { background-color: #0f172a; color: #f1f5f9; padding-top: 80px; }
        .navbar { background-color: #1e2937; border-bottom: 1px solid #334155; }
        .card { background-color: #1e2937; border: 1px solid #334155; color: #f1f5f9; border-radius: 12px;}
        .text-muted { color: #94a3b8 !important; }
        .offcanvas { background-color: rgba(15, 23, 42, 0.98) !important; backdrop-filter: blur(10px); border-right: 1px solid #334155; }
        .stratix-text { color: #ffffff !important; font-weight: 900; letter-spacing: -1px; }
        .hamburger-btn { font-size: 1.5rem; color: #fff; border: none; background: transparent; padding: 0.5rem; transition: 0.2s;}
        .hamburger-btn:hover { color: #38bdf8; }
        .nav-link { border-radius: 8px; margin-bottom: 5px; transition: 0.2s; }
        .nav-link:hover { background-color: #1e2937; color: #38bdf8 !important; padding-left: 25px !important;}
        .search-bar { background-color: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px;}
        .search-bar:focus { background-color: #0f172a; color: white; border-color: #38bdf8; box-shadow: none; }
        .search-bar::placeholder { color: #64748b; }
        .dropdown-menu-dark .dropdown-item:hover { background-color: #334155; }
        .alert-badge-rework { background-color: #ef4444; }
        .alert-badge-upload { background-color: #10b981; }
        .alert-badge-checkin { background-color: #0ea5e9; }
        
        /* Your Custom Map Styles (Useful for later!) */
        #siteMap, #miniMap { border-radius: 8px; border: 2px solid #334155; z-index: 1;}
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    
    <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1060; margin-top: 60px;"></div>

    <nav class="navbar fixed-top">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center">
                <button class="hamburger-btn me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sideMenu">
                    <i class="fas fa-bars"></i>
                </button>
                <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                    <span class="fw-bold fs-4 stratix-text">STRATIX</span>
                </a>
            </div>
            
            <div class="d-none d-md-flex w-50 justify-content-end align-items-center">
                 <div class="input-group w-50 me-4">
                     <span class="input-group-text bg-transparent border-end-0 border-secondary text-muted"><i class="fas fa-search"></i></span>
                     <input type="text" class="form-control search-bar border-start-0 pl-0" placeholder="Search Projects or Sites...">
                 </div>
                 <div class="text-light fw-semibold border-start border-secondary ps-4">
                     <i class="fas fa-hand-wave text-warning me-1"></i> Welcome, {{ user.first_name|default:user.username|title }}!
                 </div>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="sideMenu">
        <div class="offcanvas-header border-bottom border-secondary pb-3 mt-2 flex-column align-items-start">
            <div class="d-flex align-items-center justify-content-between w-100">
                <div class="d-flex align-items-center gap-2 px-2">
                    <span class="fw-bold fs-4 stratix-text">STRATIX</span>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
            </div>
        </div>
        <div class="offcanvas-body d-flex flex-column p-4">
            <ul class="nav flex-column mb-auto fs-6 fw-semibold">
                <li class="nav-item"><a class="nav-link text-warning py-2 px-3 bg-secondary bg-opacity-25" href="/"><i class="fas fa-chart-line me-3"></i> Dashboard</a></li>
                
                <li class="nav-item">
                    <a class="nav-link text-white py-2 px-3" href="{% url 'global_map' %}">
                        <i class="fas fa-globe me-3 text-success"></i> Global Map
                    </a>
                </li>
                </ul>
        </div>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
