<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Site Photo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 font-sans">
    
    <div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-lg border-t-4 border-yellow-500">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">Upload Site Photo</h2>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <label class="block text-sm font-bold text-gray-700 mb-1">Select Report / Tower</label>
            {{ form.report }}

            <label class="block text-sm font-bold text-gray-700 mb-1">Upload Photo</label>
            {{ form.image }}

            <label class="block text-sm font-bold text-gray-700 mb-1">Contractor Notes</label>
            {{ form.notes }}

            <div class="flex space-x-4 mt-4">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg w-full transition">Submit Photo</button>
                <a href="{% url 'dashboard_home' %}" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg w-full text-center transition">Cancel</a>
            </div>
        </form>
    </div>

</body>
</html>
