{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    .upload-area { border: 2px dashed #0ea5e9; border-radius: 12px; padding: 40px; text-align: center; background-color: #0f172a; transition: 0.3s;}
    .upload-area:hover { background-color: #1e2937; cursor: pointer; }
    .form-control, .form-select { background-color: #0f172a; border: 1px solid #334155; color: white; }
    .form-control:focus, .form-select:focus { background-color: #0f172a; color: white; border-color: #38bdf8; box-shadow: none; }
</style>
{% endblock %}

{% block content %}
<div class="container py-4">
    <a href="{% url 'site_visit_list' %}" class="btn btn-sm btn-outline-secondary mb-3"><i class="fas fa-arrow-left me-2"></i>Back to Directory</a>
    
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4 shadow-sm border-info border-opacity-50">
                <h4 class="fw-bold mb-4"><i class="fas fa-camera text-info me-2"></i> Upload Site Photos</h4>
                
                <form id="uploadForm" action="{% url 'upload_photos' %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Select Site</label>
                        <select name="site_id" class="form-select" required>
                            <option value="">-- Choose active site --</option>
                            {% for site in sites %}
                                <option value="{{ site.id }}">{{ site.site_id }} - {{ site.site_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Photo Category</label>
                        <select name="category" class="form-select" required>
                            <option value="Tower Base">Tower Base</option>
                            <option value="Equipment Shelter">Equipment Shelter</option>
                            <option value="Antennas">Antennas / Mounts</option>
                            <option value="Grounding">Grounding Systems</option>
                            <option value="General Site Overview">General Site Overview</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Upload Images (Multiple Allowed)</label>
                        <div class="upload-area position-relative" id="dropZone">
                            <i class="fas fa-cloud-upload-alt fs-1 text-info mb-3" id="uploadIcon"></i>
                            <h5 id="uploadText">Select photos from device</h5>
                            <input type="file" name="site_images" id="fileInput" class="form-control position-absolute top-0 start-0 w-100 h-100" style="opacity: 0; cursor: pointer;" accept="image/*" multiple required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Contractor Notes (Optional)</label>
                        <textarea class="form-control" name="notes" rows="3" placeholder="Add context for the QA reviewer..."></textarea>
                    </div>

                    <div id="progressContainer" class="mb-4" style="display: none;">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="small fw-bold text-info" id="progressText">Uploading files... 0%</span>
                            <i class="fas fa-spinner fa-spin text-info" id="progressSpinner"></i>
                        </div>
                        <div class="progress" style="height: 12px; background-color: #1e2937; border: 1px solid #334155;">
                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-info" role="progressbar" style="width: 0%;"></div>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-info w-100 fw-bold py-2"><i class="fas fa-paper-plane me-2"></i> Submit to QA Queue</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Handle File Selection Text Update
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const fileCount = e.target.files.length;
        const uploadText = document.getElementById('uploadText');
        if (fileCount > 0) {
            uploadText.innerText = fileCount + ' image(s) selected!';
            uploadText.className = 'text-success fw-bold';
        }
    });

    // NEW AJAX UPLOAD LOGIC
    document.getElementById('uploadForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Stop standard form submission

        const form = this;
        const formData = new FormData(form);
        const xhr = new XMLHttpRequest();
        
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const progressSpinner = document.getElementById('progressSpinner');
        const submitBtn = document.getElementById('submitBtn');

        // Reveal progress bar and lock the submit button
        progressContainer.style.display = 'block';
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin me-2"></i> Processing...';

        xhr.open('POST', form.action, true);
        xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest'); // Tells Django it's AJAX

        // Track upload progress byte-by-byte
        xhr.upload.addEventListener('progress', function(e) {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                progressBar.style.width = percent + '%';
                progressText.innerText = 'Uploading files... ' + percent + '%';
                
                if (percent === 100) {
                    progressText.innerText = 'Processing on server...';
                    progressBar.classList.remove('progress-bar-striped');
                }
            }
        });

        // Handle Server Response
        xhr.onload = function() {
            if (xhr.status >= 200 && xhr.status < 300) {
                // Success! Turn bar green and redirect
                progressBar.classList.add('bg-success');
                progressBar.classList.remove('bg-info');
                progressText.innerText = 'Upload Complete! Redirecting...';
                progressText.classList.replace('text-info', 'text-success');
                progressSpinner.classList.replace('fa-spinner', 'fa-check-circle');
                progressSpinner.classList.replace('fa-spin', 'text-success');
                
                setTimeout(() => {
                    window.location.href = "{% url 'site_visit_list' %}";
                }, 1000);
            } else {
                // Error handling
                alert('An error occurred during upload. Please check your connection and try again.');
                progressContainer.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane me-2"></i> Submit to QA Queue';
            }
        };

        xhr.onerror = function() {
            alert('A network error occurred. Please check your connection.');
            progressContainer.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-paper-plane me-2"></i> Submit to QA Queue';
        };

        xhr.send(formData);
    });

    // LIVE ALERTS (Kept your existing heartbeat)
    function fetchAlerts() {
        fetch("{% url 'api_check_alerts' %}").then(response => response.json()).then(data => {
            if (data.new_alerts && data.new_alerts.length > 0) {
                document.getElementById('alertSound').play().catch(e => console.log("Audio blocked."));
                const container = document.querySelector('.toast-container');
                data.new_alerts.forEach(alert => {
                    let colorClass = alert.type === 'REWORK' ? 'bg-danger' : alert.type === 'UPLOAD' ? 'bg-success' : 'bg-primary';
                    let icon = alert.type === 'REWORK' ? 'fa-exclamation-triangle' : alert.type === 'UPLOAD' ? 'fa-check-circle' : 'fa-bell';
                    container.insertAdjacentHTML('beforeend', `<div class="toast align-items-center text-white ${colorClass} border-0 mb-2 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="7000"><div class="d-flex"><div class="toast-body fw-semibold"><i class="fas ${icon} me-2"></i> [${alert.site}] ${alert.message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`);
                    new bootstrap.Toast(container.lastElementChild).show();
                });
                if(!document.getElementById('bellDot')) document.getElementById('bellIconBtn').innerHTML += `<span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle" id="bellDot"></span>`;
            }
        });
    }
    setTimeout(function() { setInterval(fetchAlerts, 10000); }, 2000);
</script>
{% endblock %}
