{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card p-4 shadow-sm border-danger-left">
                <h2 class="fw-bold text-white mb-3"><i class="fas fa-tools me-2 text-danger"></i> Fix Rejected Photo</h2>
                
                <div class="alert bg-dark border-danger text-light mb-4">
                    <p class="mb-1 text-muted small fw-bold text-uppercase">Site ID</p>
                    <p class="mb-3 fw-bold text-primary">{{ photo.site.site_id }}</p>
                    
                    <p class="mb-1 text-muted small fw-bold text-uppercase">QA Feedback</p>
                    <p class="mb-0 text-warning fst-italic"><i class="fas fa-exclamation-circle me-1"></i> "{{ photo.qa_feedback }}"</p>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="replacement_image" class="form-label text-muted fw-bold">Upload Replacement Image</label>
                        <input class="form-control bg-dark text-light border-secondary" type="file" id="replacement_image" name="replacement_image" accept="image/*" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="contractor_notes" class="form-label text-muted fw-bold">Fix Notes (Optional)</label>
                        <textarea class="form-control bg-dark text-light border-secondary" id="contractor_notes" name="contractor_notes" rows="2" placeholder="Explain the fix to the QA..."></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <a href="{% url 'rework_log' %}" class="btn btn-secondary w-50">Cancel</a>
                        <button type="submit" class="btn btn-danger w-50 fw-bold"><i class="fas fa-upload me-1"></i> Submit Fix</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
