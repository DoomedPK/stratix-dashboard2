{% load static %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stratix Real-Time Tracking</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            /* 🚀 Use your uploaded yellow/black abstract background */
            background-image: url("{% static 'images/modern-yellow-black-background-with-abstract-background-layer-shape-overlaping-illustration-vector.jpg' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* 🚀 Glassmorphism Container */
        .glass-login-card {
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent black portal */
            backdrop-filter: blur(15px); /* Frosted glass effect */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.7);
            transition: transform 0.3s ease;
        }
        .glass-login-card:hover { transform: translateY(-5px); }

        .stratix-logo-text {
            color: #ffc107; /* 🚀 Keep STRATIX yellow */
            font-weight: 900;
            letter-spacing: -2px;
            font-size: 2.5rem;
        }

        /* Styling Crispy Forms for dark/glass look */
        .form-control {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            border-radius: 10px;
            padding: 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.12) !important;
            border-color: #ffc107 !important;
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.3);
            color: #fff;
        }
        .form-label { color: rgba(255, 255, 255, 0.7) !important; font-weight: 600; font-size: 0.9rem; }
        
        /* 🚀 Password Eye Position */
        #div_id_password { position: relative; }
        .toggle-password-eye {
            position: absolute;
            right: 15px;
            top: 42px; /* Adjusted based on label height */
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            z-index: 10;
        }
        .toggle-password-eye:hover { color: #ffc107; }

        .btn-stratix-login {
            background-color: #ffc107; /* Yellow button */
            color: #000;
            font-weight: 700;
            border-radius: 10px;
            padding: 12px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-stratix-login:hover {
            background-color: #e0a800;
            color: #000;
        }
        .btn-stratix-login:active { transform: scale(0.98); }

        .form-check-label { color: rgba(255, 255, 255, 0.7); }
    </style>
</head>
<body>
    <div class="glass-login-card text-center">
        <div class="mb-4">
            <img src="{% static 'images/stratix-logo.png' %}" alt="Stratix Logo" height="60" class="mb-2">
            <h1 class="stratix-logo-text m-0">STRATIX</h1>
            <p class="text-white text-opacity-75 small">Secure Portal Access</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger text-start py-2 px-3 small" role="alert">
                <i class="fas fa-exclamation-circle me-1"></i> {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="text-start">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-stratix-login w-100 mt-3">Log In</button>
        </form>
        
        <div class="mt-4 text-center border-top border-secondary pt-3 border-opacity-25">
            <p class="small text-muted mb-0">&copy; Stratix Global Deployment Solutions</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            // 🚀 FIX: Implementation of the Password Eye Toggle
            const passwordField = $('#id_password');
            if (passwordField.length > 0) {
                // Insert the eye icon dynamically
                passwordField.after('<i class="fas fa-eye toggle-password-eye" id="togglePassword"></i>');
                
                $('#togglePassword').on('click', function() {
                    const type = passwordField.attr('type') === 'password' ? 'text' : 'password';
                    passwordField.attr('type', type);
                    
                    // Toggle icon
                    $(this).toggleClass('fa-eye fa-eye-slash');
                });
            }
        });
    </script>
</body>
</html>
