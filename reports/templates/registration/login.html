<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratix Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* This forces Django's automatic form to look beautiful! */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb; /* Light gray outline */
            border-radius: 0.5rem; /* Rounded corners */
            background-color: #f9fafb;
            color: #111827;
            transition: all 0.2s ease-in-out;
            margin-bottom: 0.5rem;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #3b82f6; /* Blue outline when clicked */
            background-color: #ffffff;
        }
        label {
            display: block;
            font-weight: 700;
            font-size: 0.875rem;
            color: #374151;
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-96 border-t-4 border-yellow-400">
        
        <h2 class="text-3xl font-extrabold mb-6 text-center tracking-tight">
            <span class="text-yellow-400">Stratix</span><span class="text-black">Portal</span>
        </h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="text-gray-700">
                {{ form.as_p }}
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 mt-4 shadow-sm">
                Sign In
            </button>
        </form>
    </div>

</body>
</html>
